name: Azure Key Vault Secret Read (OIDC)

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]

permissions:
  id-token: write   # required for OIDC
  contents: read

jobs:
  read-secret:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Read secret from Key Vault
        id: kv
        uses: azure/CLI@v2
        with:
          inlineScript: |
            echo "Reading secret from Key Vault..."
            SECRET=$(az keyvault secret show \
              --vault-name "kv-securesecretscicd3018" \
              --name "demo-api-key" \
              --query value -o tsv)

            # mask secret so it won't appear in logs
            echo "::add-mask::$SECRET"
            echo "demo_api_key=$SECRET" >> $GITHUB_OUTPUT

      - name: Use secret (masked)
        shell: bash
        run: |
            SECRET="${{ steps.kv.outputs.demo_api_key }}"
            echo "Secret fetched successfully. Length: ${#SECRET}"
            echo "✅ Using the secret in a safe way (masked in logs)."